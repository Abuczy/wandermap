name: WanderMap CI/CD
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
jobs:
  # -------- BACKEND --------
  backend:
    name: Backend (Python/FastAPI)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4
 
      - name: Ustaw Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Zainstaluj zależności backendu
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy psycopg2-binary \
            "python-jose[cryptography]" bcrypt python-multipart \
            requests "pydantic[email]" python-dotenv pytest httpx
 
      - name: Sprawdź składnię (lint)
        working-directory: backend
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__,venv
 
      - name: Sprawdź importy
        working-directory: backend
        run: python -c "import main; print('Backend OK')"
        env:
          DATABASE_URL: "postgresql://wander:wander123@localhost:5432/wandermap"
          OPENWEATHER_API_KEY: "test"
          UNSPLASH_ACCESS_KEY: "test"
          SECRET_KEY: "testsecretkey"
 
  # -------- FRONTEND --------
  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4
 
      - name: Ustaw Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
 
      - name: Zainstaluj zależności frontendu
        working-directory: frontend
        run: npm install
 
      - name: Zbuduj frontend
        working-directory: frontend
        run: npm run build
 